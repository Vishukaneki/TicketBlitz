services:
  postgres:
    image: postgres:16-alpine
    container_name: bms2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bms2
      POSTGRES_PASSWORD: bms2password
      POSTGRES_DB: bms2db
    ports:
      - "5432:5432"
    volumes:
      - bms2_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bms2"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bms2_redis
    restart: unless-stopped
    command: redis-server --requirepass bms2redis
    ports:
      - "6379:6379"
    volumes:
      - bms2_redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: bms-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: bms-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  bms2_postgres_data:
  bms2_redis_data: